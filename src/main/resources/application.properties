spring.application.name=Device_Tracking

# ✅ Render dynamic port (works locally also)
server.port=${PORT:8080}

# ===============================
# DATABASE (PostgreSQL - from ENV)
# ===============================
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# ===============================
# JPA / HIBERNATE
# ===============================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# Hibernate auto-detects dialect → no need to set manually

# ===============================
# THYMELEAF
# ===============================
spring.thymeleaf.cache=false

# ===============================
# SESSION COOKIE (Required for HTTPS on Render)
# ===============================
server.servlet.session.cookie.same-site=none
server.servlet.session.cookie.secure=true
